{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}L-MACK - Iniciar Sesión{% endblock %}

{% block content %}
<!-- LOGIN FORM -->
<div class="login-container">
    <div class="login-card">

        <!-- HEADER -->
        <div class="login-header">
            <h2>Iniciar Sesión</h2>
        </div>

        <!-- FORM -->
        <form method="POST" action="{% url 'login:login' %}">
            {% csrf_token %}
            {% if next %}
                <input type="hidden" name="next" value="{{ next }}">
            {% endif %}

            <!-- MENSAJES -->
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger" role="alert" style="background-color: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; padding: 12px 16px; border-radius: 6px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; font-size: 14px; font-family: inherit; box-sizing: border-box;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16" style="flex-shrink: 0; color: #842029;">
                            <path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5m.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2"/>
                        </svg>
                        <div style="flex-grow: 1; text-align: left;">
                            {{ message }}
                        </div>
                    </div>
                {% endfor %}
            {% endif %}

            <div class="login-form-group">
                <label>Número de documento</label>
                <input type="text" name="Cedula" placeholder="Número de documento" required
                    style="width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 6px; box-sizing: border-box;">
            </div>

            <div class="login-form-group">
                <label>Contraseña</label>
                <div style="position: relative; width: 100%;">
                    <input type="password" id="passwordField" name="contraseña" placeholder="Contraseña" required
                        style="width: 100%; padding: 12px; padding-right: 45px; border: 1px solid #e0e0e0; border-radius: 6px; box-sizing: border-box;">
                    <button type="button" id="togglePassword" 
                        style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #6c757d; padding: 5px; display: flex; align-items: center; justify-content: center; z-index: 10;">
                        <!-- Ojo abierto (indica que al hacer click se mostrará) -->
                        <svg id="eyeOpenIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/>
                            <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
                        </svg>
                        <!-- Ojo cerrado (indica que al hacer click se ocultará) -->
                        <svg id="eyeClosedIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16" style="display: none;">
                            <path d="M13.359 11.238C15.06 9.72 16 8 16 8s-3-5.5-8-5.5a8 8 0 0 0-2.79.513L6.5 4.318l.766.766A4 4 0 0 1 8 5c.046 0 .093.001.14.002L9.3 6.162a3 3 0 0 1-.4 3.73l.63.63a4 4 0 0 0 .61-3.76l1.396 1.396c.499.731.829 1.414.923 1.617M10.474 8.09l-1.396-1.396.48-.48.41.41z"/>
                            <path d="M12.41 12.41c-1.387 1.025-2.82 1.59-4.41 1.59-5 0-8-5.5-8-5.5a12.5 12.5 0 0 1 1.636-2.227l1.017 1.017C1.848 8.04 1 8 1 8s3 5.5 8 5.5c.82 0 1.58-.176 2.22-.486z"/>
                            <path d="M6 8a2 2 0 0 0 2 2 2 2 0 0 0 1.287-.468L6.468 8.287A2 2 0 0 0 6 8M3 5 1.5 3.5l.707-.707 11.5 11.5-.707.707L11.5 13.5z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-primary"
                style="width: 100%; margin-top: 10px;">
                Entrar
            </button>
        </form>

    </div>
</div>

<script>
    document.getElementById('togglePassword').addEventListener('click', function () {
        const passwordField = document.getElementById('passwordField');
        const eyeOpenIcon = document.getElementById('eyeOpenIcon');
        const eyeClosedIcon = document.getElementById('eyeClosedIcon');
        
        if (passwordField.type === 'password') {
            passwordField.type = 'text';
            eyeOpenIcon.style.display = 'none';
            eyeClosedIcon.style.display = 'block';
        } else {
            passwordField.type = 'password';
            eyeOpenIcon.style.display = 'block';
            eyeClosedIcon.style.display = 'none';
        }
    });
</script>
{% endblock %}
