{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>{% block title %}Panel de Guarda{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/emac-style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .layout-container { display: flex; min-height: 100vh; background-color: var(--cream-bg); }
        .sidebar {
            width: 260px;
            background-color: var(--primary-green);
            color: white;
            padding: 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 8px rgba(0,0,0,0.1);
        }
        .sidebar-header {
            padding: 25px 20px;
            background-color: var(--dark-green);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-header h3 {
            margin: 0;
            color: white;
            font-size: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-header h3::before {
            content: "👤";
            font-size: 28px;
        }
        .sidebar-nav { padding: 20px 0; flex: 1; }
        .sidebar-nav a {
            display: block;
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            padding: 15px 25px;
            transition: all 0.3s;
            border-left: 3px solid transparent;
            font-size: 15px;
        }
        .sidebar-nav a:hover { background: rgba(255,255,255,0.1); border-left-color: var(--light-green); color: white; padding-left: 30px; }
        .sidebar-footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: auto; }
        .btn-logout {
            width: 100%;
            padding: 12px 20px;
            background-color: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-logout:hover { background-color: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.3); }
        .main-content { flex: 1; margin-left: 260px; padding: 20px; min-height: 100vh; background-color: var(--cream-bg); }
        .content-wrapper { background: var(--white); border-radius: 8px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .module-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .module-title {
            margin: 0;
            color: var(--primary-green);
            font-weight: 600;
        }
        .module-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .module-toolbar > a {
            display: none;
        }
        .filters-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 16px;
        }
        .filters-card label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: #374151;
            margin-bottom: 4px;
        }
        .filters-card .form-control,
        .filters-card .form-select {
            height: 38px;
        }
        .filters-actions {
            display: flex;
            gap: 8px;
        }
        @media (max-width: 768px) {
            .content-wrapper {
                padding: 20px;
            }
            .filters-actions {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="layout-container">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h3>L-MACK</h3>
        </div>
        <nav class="sidebar-nav">
            <a href="{% url 'guarda:guarda_index' %}">🏠 Inicio</a>
            <a href="{% url 'guarda:guarda_ambientes' %}">🏢 Ambientes</a>
            <a href="{% url 'guarda:guarda_incidentes' %}">⚠️ Incidentes</a>
            <a href="{% url 'guarda:guarda_minutas' %}">📝 Minutas</a>
            <a href="{% url 'guarda:guarda_traslados' %}">🔁 Traslados</a>
            <a href="{% url 'guarda:guarda_perfil' %}">👤 Mi Perfil</a>
        </nav>
        <div class="sidebar-footer">
            <a class="btn btn-logout" href="{% url 'guarda:guarda_logout' %}">Cerrar sesión</a>
        </div>
    </aside>
    <main class="main-content">
        <div class="content-wrapper">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
            {% block content %}{% endblock %}
        </div>
    </main>
</div>
<script>
    if (window.history && window.history.replaceState) {
        window.history.replaceState(null, "", window.location.href);
    }
    window.addEventListener("pageshow", function (event) {
        if (event.persisted) {
            window.location.reload();
        }
    });
</script>
</body>
</html>
